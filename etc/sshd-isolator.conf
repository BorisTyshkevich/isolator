# Isolator: accept ISO_TOKEN_* env vars sent via SSH SendEnv.
#
# Auth secrets resolved by `iso -s <user> ...` are forwarded to the sandbox
# session as ISO_TOKEN_<NAME> env vars; /etc/isolator/profile un-prefixes
# them back to the real names. Without this AcceptEnv directive, sshd
# strips them on receive.
#
# Install:
#   sudo cp etc/sshd-isolator.conf /etc/ssh/sshd_config.d/isolator.conf
#   sudo launchctl kickstart -k system/com.openssh.sshd  # macOS
#
# Verify with:  ssh -v user@localhost  (look for "debug1: Sending env ISO_TOKEN_*")
AcceptEnv ISO_TOKEN_*
